<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mundial 2026 — Clubes</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling extension for club list select */
    #club-selector-wrap {
      margin: 14px 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .club-select-el {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      padding: 0 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      outline: none;
    }
  </style>
</head>
<body>

<header id="app-header"></header>
<nav id="top-nav"></nav>

<div id="page">
  <!-- Top Clubs Chart -->
  <div class="section" style="margin-top: 14px;">
    <div class="card">
      <div class="section-title">Clubes con más jugadores en el Mundial</div>
      <div class="chart-wrap-lg"><canvas id="chart-clubs-top"></canvas></div>
    </div>
  </div>

  <!-- Club Search and Roster view -->
  <div id="club-selector-wrap">
    <div class="section-title" style="margin-left: 2px;">Ver jugadores por club</div>
    <select id="club-dropdown" class="club-select-el" aria-label="Ver jugadores por club">
      <option value="">Selecciona un club...</option>
    </select>
  </div>

  <div class="section" style="margin-bottom: 4px;">
    <div class="card" style="padding:16px 16px 8px">
      <div class="section-title" id="club-roster-title">Jugadores del club</div>
      <div id="club-players-list">
        <div style="font-size:12px;color:var(--muted);padding:10px 0;text-align:center;">Selecciona un club arriba para ver su lista de jugadores.</div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const all=TEAMS.flatMap(t=>t.players);
  
  // Calculate club counts
  const clubCounts = {};
  all.forEach(p => {
    if (p.club) {
      clubCounts[p.club] = (clubCounts[p.club] || 0) + 1;
    }
  });

  // Sort and extract top 15 clubs
  const sortedClubs = Object.entries(clubCounts)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 15);

  const labels = sortedClubs.map(c => c[0]);
  const data = sortedClubs.map(c => c[1]);

  // Render horizontal bar chart of clubs
  new Chart(document.getElementById('chart-clubs-top'), {
    type: 'bar',
    data: {
      labels: labels.map(l => l.split(" (")[0]), // Shorten labels
      datasets: [{
        data: data,
        backgroundColor: '#2A398D',
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (c) => ` ${labels[c.dataIndex]}: ${c.raw} jugadores`
          }
        }
      },
      scales: {
        x: { beginAtZero: true, grid: { color: '#f2f2f2' }, ticks: { font: { size: 10 } } },
        y: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#333' } }
      }
    }
  });

  // Populate Club Selector
  const clubDropdown = document.getElementById("club-dropdown");
  const allClubsSorted = Object.keys(clubCounts).sort();
  
  allClubsSorted.forEach(c => {
    const o = document.createElement("option");
    o.value = c;
    o.textContent = `${c} (${clubCounts[c]} j.)`;
    clubDropdown.appendChild(o);
  });

  clubDropdown.addEventListener("change", () => {
    const club = clubDropdown.value;
    renderClubRoster(club);
  });
});

function renderClubRoster(club) {
  const listEl = document.getElementById("club-players-list");
  const titleEl = document.getElementById("club-roster-title");
  
  if (!club) {
    titleEl.textContent = "Jugadores del club";
    listEl.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:10px 0;text-align:center;">Selecciona un club arriba para ver su lista de jugadores.</div>`;
    return;
  }

  titleEl.textContent = `Jugadores de: ${club}`;

  const allPlayers = TEAMS.flatMap(t => t.players.map(p => ({...p, teamName: t.name, teamCode: t.code})));
  const clubPlayers = allPlayers.filter(p => p.club === club);

  if (clubPlayers.length === 0) {
    listEl.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:10px 0;text-align:center;">No hay jugadores registrados de este club.</div>`;
    return;
  }

  listEl.innerHTML = clubPlayers.map(p => `
    <div class="player-item">
      <span class="player-num" style="width: 34px; text-align: left; color: var(--blue); font-weight:800;">${p.teamCode}</span>
      <span class="pos-chip pos-${p.pos}">${POS_LABEL[p.pos].slice(0,3).toUpperCase()}</span>
      <div class="player-info" style="margin-left: 8px;">
        <div class="player-name">${p.name} (#${p.num})</div>
        <div class="player-club">${p.teamName}</div>
      </div>
      <div class="player-meta">
        <span class="player-age">${p.age} años</span>
        <span class="player-ht">${p.height} cm</span>
      </div>
    </div>
  `).join("");
}
</script>
</body>
</html>
