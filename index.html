<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mundial 2026 — Selecciones</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="app-header"></header>
<nav id="top-nav"></nav>

<div id="page">
  <!-- Team Dashboard View -->
  <div id="view-team" class="view active">
    <div id="team-picker">
      <div id="team-picker-inner">
        <span id="team-picker-label">Selecciona una Selección</span>
        <span id="team-picker-arrow">▾</span>
        <select id="team-select" aria-label="Selecciona una selección"></select>
      </div>
    </div>

    <!-- Hero Card -->
    <div class="hero">
      <h2 id="t-name"></h2>
      <div class="hero-code" id="t-code"></div>
      <div class="pills" id="t-pills"></div>
    </div>

    <!-- Posiciones + Edades -->
    <div class="section" style="margin-top:14px">
      <div class="grid2">
        <div class="card">
          <div class="section-title">Posiciones</div>
          <div class="chart-wrap"><canvas id="chart-pos"></canvas></div>
        </div>
        <div class="card">
          <div class="section-title">Edades</div>
          <div class="chart-wrap"><canvas id="chart-age"></canvas></div>
        </div>
      </div>
    </div>

    <!-- Altura -->
    <div class="section">
      <div class="card">
        <div class="section-title">Distribución de Altura (cm)</div>
        <div class="chart-wrap"><canvas id="chart-height"></canvas></div>
      </div>
    </div>

    <!-- Tops -->
    <div class="section">
      <div class="card">
        <div class="section-title">Más internacionales</div>
        <div class="chart-wrap-md"><canvas id="chart-caps"></canvas></div>
      </div>
    </div>
    <div class="section">
      <div class="card">
        <div class="section-title">Máximos goleadores</div>
        <div class="chart-wrap-md"><canvas id="chart-goals"></canvas></div>
      </div>
    </div>

    <!-- Plantel -->
    <div class="section" style="margin-bottom:4px">
      <div class="card" style="padding:16px 16px 8px">
        <div class="section-title">Plantel completo</div>
        <div id="players-list"></div>
      </div>
    </div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
// Logic specific to the selection dashboard
document.addEventListener("DOMContentLoaded", () => {
  const sel=document.getElementById('team-select');
  const lbl=document.getElementById('team-picker-label');
  
  // Populate select dropdown
  TEAMS.forEach(t=>{
    const o=document.createElement('option');
    o.value=t.code; o.textContent=`${t.name} (${t.code})`;
    sel.appendChild(o);
  });
  
  sel.addEventListener('change',()=>{
    lbl.textContent=sel.options[sel.selectedIndex].textContent;
    renderTeam(sel.value);
  });

  // Render first team by default
  sel.value = 'ALG';
  lbl.textContent = sel.options[0].textContent;
  renderTeam('ALG');
});

function renderTeam(code){
  const t=TEAMS.find(x=>x.code===code);
  if(!t) return;
  
  document.getElementById('t-name').textContent=t.name;
  document.getElementById('t-code').textContent=t.code+' · '+t.players.length+' jugadores';

  document.getElementById('t-pills').innerHTML=`
    <div class="pill"><div class="pill-val">${t.avgAge}</div><div class="pill-lbl">Edad media</div></div>
    <div class="pill"><div class="pill-val">${t.avgHeight}</div><div class="pill-lbl">Altura (cm)</div></div>
    <div class="pill"><div class="pill-val">${t.avgCaps}</div><div class="pill-lbl">Caps medios</div></div>
    <div class="pill"><div class="pill-val">${t.totalGoals}</div><div class="pill-lbl">Goles totales</div></div>
    <div class="pill"><div class="pill-val">${t.minAge}</div><div class="pill-lbl">Edad mín.</div></div>
    <div class="pill"><div class="pill-val">${t.maxAge}</div><div class="pill-lbl">Edad máx.</div></div>
  `;

  // Posiciones (donut)
  dc('chart-pos',()=>new Chart(document.getElementById('chart-pos'),{
    type:'doughnut',
    data:{labels:['Portero','Defensa','Mediocampista','Delantero'],datasets:[{
      data:t.posCounts,backgroundColor:['#856404','#1d4ed8','#15803d','#b91c1c'],
      borderWidth:0
    }]},
    options:{
      plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10,padding:8}}},
      cutout:'62%',responsive:true,maintainAspectRatio:false
    }
  }));

  // Edad histogram
  const ageBuckets={};
  t.players.forEach(p=>{const b=Math.floor(p.age/3)*3; const k=`${b}-${b+2}`; ageBuckets[k]=(ageBuckets[k]||0)+1;});
  const aKeys=Object.keys(ageBuckets).sort((a,b)=>parseInt(a)-parseInt(b));
  dc('chart-age',()=>new Chart(document.getElementById('chart-age'),{
    type:'bar',
    data:{labels:aKeys,datasets:[{data:aKeys.map(k=>ageBuckets[k]),backgroundColor:'#2A398D',borderRadius:4,borderSkipped:false}]},
    options:{...chartDefaults,scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:9}},grid:{color:'#f2f2f2'}}}}
  }));

  // Altura histogram
  const hBuckets={};
  t.players.forEach(p=>{const b=Math.floor(p.height/5)*5; hBuckets[b]=(hBuckets[b]||0)+1;});
  const hKeys=Object.keys(hBuckets).sort((a,b)=>parseInt(a)-parseInt(b));
  dc('chart-height',()=>new Chart(document.getElementById('chart-height'),{
    type:'bar',
    data:{labels:hKeys.map(k=>`${k}`),datasets:[{data:hKeys.map(k=>hBuckets[k]),backgroundColor:'#3CAC3B',borderRadius:4,borderSkipped:false}]},
    options:{...chartDefaults,scales:{x:{grid:{display:false},ticks:{font:{size:9}}},y:{beginAtZero:true,ticks:{stepSize:1,font:{size:9}},grid:{color:'#f2f2f2'}}}}
  }));

  // Top caps
  const topCaps=[...t.players].sort((a,b)=>b.caps-a.caps).slice(0,10);
  dc('chart-caps',()=>new Chart(document.getElementById('chart-caps'),{
    type:'bar',
    data:{labels:topCaps.map(p=>p.name.split(' ')[1]||p.name),datasets:[{data:topCaps.map(p=>p.caps),backgroundColor:'#2A398D',borderRadius:4,borderSkipped:false}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const p=topCaps[c.dataIndex]; return ` ${p.name}: ${c.raw} caps`;} }}},
      scales:{x:{beginAtZero:true,grid:{color:'#f2f2f2'},ticks:{font:{size:10}}},y:{grid:{display:false},ticks:{font:{size:11},color:'#333'}}}
    }
  }));

  // Top goals
  const topGoals=[...t.players].sort((a,b)=>b.goals-a.goals).filter(p=>p.goals>0).slice(0,10);
  const goalsData=topGoals.length?topGoals:[...t.players].sort((a,b)=>b.goals-a.goals).slice(0,5);
  dc('chart-goals',()=>new Chart(document.getElementById('chart-goals'),{
    type:'bar',
    data:{labels:goalsData.map(p=>p.name.split(' ')[1]||p.name),datasets:[{data:goalsData.map(p=>p.goals),backgroundColor:'#E61D25',borderRadius:4,borderSkipped:false}]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const p=goalsData[c.dataIndex]; return ` ${p.name}: ${c.raw} goles`;} }}},
      scales:{x:{beginAtZero:true,grid:{color:'#f2f2f2'},ticks:{font:{size:10}}},y:{grid:{display:false},ticks:{font:{size:11},color:'#333'}}}
    }
  }));

  // Players list roster
  const maxC=Math.max(...t.players.map(p=>p.caps),1);
  const maxG=Math.max(...t.players.map(p=>p.goals),1);
  document.getElementById('players-list').innerHTML=t.players.map(p=>`
    <div class="player-item">
      <span class="player-num">${p.num}</span>
      <span class="pos-chip pos-${p.pos}">${POS_LABEL[p.pos].slice(0,3).toUpperCase()}</span>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-club">${p.club}</div>
      </div>
      <div class="player-meta">
        <span class="player-age">${p.age} años</span>
        <span class="player-ht">${p.height} cm</span>
        <div class="player-stat">
          <span style="color:var(--blue);font-weight:700">${p.caps}</span>
          <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(p.caps/maxC*100)}%;background:var(--blue)"></div></div>
        </div>
        <div class="player-stat">
          <span style="color:var(--red);font-weight:700">${p.goals}</span>
          <div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${Math.round(p.goals/maxG*100)}%;background:var(--red)"></div></div>
        </div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
